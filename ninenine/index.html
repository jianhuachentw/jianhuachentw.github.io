<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Outfit Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <title>九九乘法大挑戰 | Multiplication Master</title>
</head>

<body>
  <div id="app">
    <div class="glass-container">
      <!-- Floating Background Elements -->
      <div class="circle c2"></div>

      <button id="mute-btn" class="mute-toggle" aria-label="Mute Toggle">
        <span id="mute-icon">🔊</span>
      </button>

      <!-- Start Screen -->
      <div id="start-screen" class="screen active">
        <h1>九九乘法<br>大挑戰</h1>

        <!-- Avatar Display Container -->
        <div class="avatar-display-box">
          <div id="main-avatar" class="avatar-container">
            <!-- Avatar parts injected here -->
          </div>
          <button id="avatar-shop-btn" class="btn-secondary btn-small mt-2">✨ 裝扮阿凡達</button>
        </div>

        <p class="subtitle">準備好測試你的算術能力了嗎？</p>
        <button id="stage-select-btn" class="btn-primary">冒險模式</button>
        <button id="start-btn" class="btn-secondary mt-2">無盡挑戰</button>
        <button id="shop-btn-start" class="btn-secondary mt-2">前往道具商店</button>
      </div>

      <!-- Stage Select Screen -->
      <div id="stage-select-screen" class="screen">
        <h2>選擇關卡</h2>
        <div class="stars-display">
          <span>⭐</span> <span id="stage-select-stars">0</span>
        </div>
        <div id="stages-grid" class="stages-grid">
          <!-- Stage buttons injected via JS -->
        </div>
        <button id="stage-select-back-btn" class="btn-secondary mt-2">返回</button>
      </div>

      <!-- Avatar Shop Screen -->
      <div id="avatar-shop-screen" class="screen">
        <h2>裝扮阿凡達</h2>
        <div class="stars-display">
          <span>⭐</span> <span id="avatar-shop-stars">0</span>
        </div>

        <div class="avatar-shop-layout">
          <!-- Preview Area -->
          <div class="avatar-preview-box">
            <div id="preview-avatar" class="avatar-container">
              <!-- Avatar parts injected here -->
            </div>
          </div>

          <!-- Shop Area -->
          <div class="avatar-shop-panel">
            <div class="avatar-tabs">
              <button class="avatar-tab active" data-category="hair">頭髮</button>
              <button class="avatar-tab" data-category="eyes">眼睛</button>
              <button class="avatar-tab" data-category="nose">鼻子</button>
              <button class="avatar-tab" data-category="mouth">嘴巴</button>
              <button class="avatar-tab" data-category="accessory">配件</button>
            </div>
            <div id="avatar-items-grid" class="avatar-grid">
              <!-- Items injected here via JS -->
            </div>
          </div>
        </div>
        <button id="avatar-shop-back-btn" class="btn-secondary mt-2">返回</button>
      </div>

      <!-- Shop Screen -->
      <div id="shop-screen" class="screen">
        <h2>道具商店</h2>
        <div class="stars-display">
          <span>⭐</span> <span id="shop-stars">0</span>
        </div>
        <div class="shop-items">
          <div class="shop-item">
            <h3>+5 秒卡</h3>
            <p>在遊戲中延長 5 秒時間</p>
            <button id="buy-plus5-btn" class="buy-btn">50 ⭐ 購買</button>
            <p class="inventory-hint">擁有: <span id="inventory-plus5">0</span></p>
          </div>
          <div class="shop-item">
            <h3>刪去卡</h3>
            <p>刪除兩個錯誤答案</p>
            <button id="buy-remove-wrong-btn" class="buy-btn">80 ⭐ 購買</button>
            <p class="inventory-hint">擁有: <span id="inventory-remove-wrong">0</span></p>
          </div>
          <div class="shop-item">
            <h3>回血卡</h3>
            <p>恢復一顆愛心</p>
            <button id="buy-heal-btn" class="buy-btn">100 ⭐ 購買</button>
            <p class="inventory-hint">擁有: <span id="inventory-heal">0</span></p>
          </div>
        </div>
        <button id="shop-back-btn" class="btn-secondary mt-2">返回</button>
      </div>

      <!-- Game Screen -->
      <div id="game-screen" class="screen">
        <div class="hud">
          <div id="hearts-container" class="hearts-box"></div>
          
          <!-- Adventure Mode Progress UI -->
          <div id="adventure-ui" class="adventure-ui" style="display: none;">
            <div id="normal-progress" class="normal-progress">
              <span class="progress-label">進度：</span>
              <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
              <span id="progress-text" class="progress-text-val">0/5</span>
            </div>
            <div id="boss-progress" class="boss-progress" style="display: none;">
              <span class="boss-icon shake" id="boss-icon">😈</span>
              <div class="boss-hp-bar"><div id="boss-hp-fill" class="boss-hp-fill"></div></div>
              <span id="boss-hp-text" class="boss-hp-text-val">10/10</span>
            </div>
          </div>

          <div class="stats-group">
            <div class="timer-box">⏳ <span id="timer">8</span>s</div>
            <div class="score-box" id="score-box-container">✨ <span id="score">0</span></div>
            <button id="end-game-btn" class="btn-secondary btn-small">結束遊戲</button>
          </div>
          <div class="item-bar">
            <button id="use-plus5-btn" class="item-btn" title="使用 +5 秒卡">
              +5s <span class="badge" id="game-inventory-plus5">0</span>
            </button>
            <button id="use-remove-wrong-btn" class="item-btn" title="使用 刪去卡">
              刪去 <span class="badge" id="game-inventory-remove-wrong">0</span>
            </button>
            <button id="use-heal-btn" class="item-btn" title="使用 回血卡">
              回血 <span class="badge" id="game-inventory-heal">0</span>
            </button>
          </div>
        </div>

        <div class="question-container">
          <div class="question">
            <span id="num1">?</span>
            <span class="operator">×</span>
            <span id="num2">?</span>
          </div>
        </div>
        <div id="options-container" class="options-grid">
          <!-- Options will be generated here -->
        </div>
        <p id="feedback-msg" class="feedback"></p>
      </div>

      <!-- Stage Clear Screen -->
      <div id="stage-clear-screen" class="screen">
        <h2 class="victory-title">關卡完成！🎉</h2>
        <div class="final-score">
          <p>獲得星星</p>
          <span id="stage-clear-stars-display">0</span>
        </div>
        <button id="next-stage-btn" class="btn-primary">下一關</button>
        <button id="back-to-stages-btn" class="btn-secondary mt-2">選擇關卡</button>
        <button id="stage-clear-shop-btn" class="btn-secondary mt-2">✨ 裝扮阿凡達</button>
      </div>

      <!-- End Screen -->
      <div id="end-screen" class="screen">
        <h2>遊戲結束</h2>
        <div class="final-score">
          <p>你的得分</p>
          <span id="final-score-display">0</span>
        </div>
        <button id="restart-btn" class="btn-primary">再玩一次</button>
        <button id="shop-btn-end" class="btn-secondary mt-2">前往道具商店</button>
        <button id="avatar-shop-btn-end" class="btn-secondary mt-2">✨ 裝扮阿凡達</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
