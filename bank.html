<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集點銀行</title>
    <style>
        :root {
            --main-color: #00796b;
            --bg-color: #e0f2f1;
        }

        body {
            font-family: -apple-system, "Microsoft JhengHei", sans-serif;
            background: var(--bg-color);
            padding: 15px;
            color: #333;
            transition: 0.3s;
        }

        .card {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .tabs {
            display: flex;
            margin-bottom: 20px;
            gap: 10px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #eee;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
            border: 2px solid transparent;
        }

        .tab.active[data-child="yujie"] {
            background: #00796b;
            color: white;
            border-color: #004d40;
        }

        .tab.active[data-child="yingan"] {
            background: #673ab7;
            color: white;
            border-color: #4527a0;
        }

        h2 {
            text-align: center;
            color: var(--main-color);
            margin-top: 0;
        }

        .bank-balance {
            font-size: 1.2em;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 15px;
            background: #fff5f5;
            padding: 8px;
            border-radius: 10px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .pts {
            color: #f57c00;
            font-weight: bold;
            font-size: 0.9em;
            margin-right: 5px;
        }

        .score-zone {
            text-align: center;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px solid #ddd;
        }

        #total-score {
            font-size: 2.2em;
            color: var(--main-color);
            display: block;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn-settle {
            background: var(--main-color);
            color: white;
            box-shadow: 0 4px #004d40;
        }

        .btn-settle:active {
            transform: translateY(2px);
            box-shadow: 0 2px #004d40;
        }

        .btn-reset {
            background: #f5f5f5;
            color: #9e9e9e;
            font-size: 0.8em;
            margin-top: 15px;
        }

        .history-title {
            margin-top: 25px;
            display: block;
            border-left: 4px solid var(--main-color);
            padding-left: 10px;
            font-weight: bold;
        }

        .history-item {
            font-size: 0.85em;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
        }

        .del-btn {
            color: #ff5252;
            cursor: pointer;
            padding: 5px 10px;
            border: 1px solid #ffcdd2;
            border-radius: 5px;
            background: white;
        }

        input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="tabs">
            <div id="tab-yujie" class="tab active" data-child="yujie" onclick="switchChild('yujie')">俞潔</div>
            <div id="tab-yingan" class="tab" data-child="yingan" onclick="switchChild('yingan')">盈安</div>
        </div>

        <h2 id="child-title">俞潔 的集點卡</h2>

        <div style="text-align: center;">
            <div class="bank-balance">💰 銀行餘額：<span id="bank-val">0</span> 元</div>
        </div>

        <div id="task-list">
            <div class="item"><span>做家事</span>
                <div><span class="pts">+2</span><input type="checkbox" class="cb" data-pts="2"></div>
            </div>
            <div class="item"><span>幫卡西換果凍跟整理家</span>
                <div><span class="pts">+1</span><input type="checkbox" class="cb" data-pts="1"></div>
            </div>
            <div class="item"><span>學注音/英文</span>
                <div><span class="pts">+5</span><input type="checkbox" class="cb" data-pts="5"></div>
            </div>
            <div class="item"><span>收拾玩具</span>
                <div><span class="pts">+1</span><input type="checkbox" class="cb" data-pts="1"></div>
            </div>
            <div class="item"><span>整理書包</span>
                <div><span class="pts">+1</span><input type="checkbox" class="cb" data-pts="1"></div>
            </div>
            <div class="item"><span>餐盤放水槽</span>
                <div><span class="pts">+1</span><input type="checkbox" class="cb" data-pts="1"></div>
            </div>
            <div class="item"><span>便當放水槽</span>
                <div><span class="pts">+1</span><input type="checkbox" class="cb" data-pts="1"></div>
            </div>
            <div class="item"><span>請家長簽名</span>
                <div><span class="pts">+1</span><input type="checkbox" class="cb" data-pts="1"></div>
            </div>
            <div class="item"><span>20:00前完成作業</span>
                <div><span class="pts">+1</span><input type="checkbox" class="cb" data-pts="1"></div>
            </div>
            <div class="item"><span>預習功課</span>
                <div><span class="pts">+2</span><input type="checkbox" class="cb" data-pts="2"></div>
            </div>
            <div class="item"><span>讀完2本課外書(週)</span>
                <div><span class="pts">+2</span><input type="checkbox" class="cb" data-pts="2"></div>
            </div>
            <div class="item"><span>完成自修一單元(週)</span>
                <div><span class="pts">+5</span><input type="checkbox" class="cb" data-pts="5"></div>
            </div>
        </div>

        <div class="score-zone">
            本週目前累計 <span id="total-score">0</span>
            <small style="color:#666">10點換電視 | 30點換平板</small>
        </div>

        <button id="settle-btn" class="btn-settle" onclick="settle()">🏦 結算並存入銀行</button>
        <button class="btn-settle" style="background:#e91e63; box-shadow:0 4px #c2185b; margin-top:10px;" onclick="redeem()">🎁 兌換獎勵 (扣點)</button>
        <button class="btn-reset" onclick="resetToday()">清空今日勾選 (不計入歷史)</button>

        <button class="btn-settle" style="background:#2196f3; box-shadow:0 4px #1976d2; margin-top:20px;"
            onclick="location.href='chart.html'">📊 查看點數歷史圖表</button>

        <strong class="history-title">📜 歷史存摺紀錄</strong>
        <div id="history-content"></div>
    </div>

    <script>
        let currentChild = 'yujie';
        const config = {
            yujie: { name: '俞潔', color: '#00796b', bg: '#e0f2f1' },
            yingan: { name: '盈安', color: '#673ab7', bg: '#ede7f6' }
        };

        function switchChild(id) {
            currentChild = id;
            // 切換樣式
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');

            const c = config[id];
            document.documentElement.style.setProperty('--main-color', c.color);
            document.documentElement.style.setProperty('--bg-color', c.bg);
            document.getElementById('child-title').innerText = c.name + " 的集點卡";
            document.getElementById('child-title').style.color = c.color;

            resetToday();
            loadData();
        }

        function updateScore() {
            let score = 0;
            document.querySelectorAll('.cb').forEach(cb => { if (cb.checked) score += parseInt(cb.dataset.pts); });
            document.getElementById('total-score').innerText = score;
        }

        function settle() {
            let score = parseInt(document.getElementById('total-score').innerText);
            if (score === 0) return alert("還沒有點數可以結算喔！");

            let date = new Date().toLocaleDateString();
            let record = { id: Date.now(), date, used: 0, remain: score };

            let history = JSON.parse(localStorage.getItem(currentChild + '_logs') || "[]");
            history.unshift(record);
            localStorage.setItem(currentChild + '_logs', JSON.stringify(history));

            alert(`結算成功！${score} 點已存入 ${config[currentChild].name} 的銀行紀錄。`);
            resetToday();
            loadData();
        }

        function redeem() {
            let balance = parseInt(document.getElementById('bank-val').innerText);
            if (balance <= 0) return alert("銀行目前沒有點數喔！");

            let used = prompt(`【${config[currentChild].name}】目前銀行餘額 ${balance} 點。\n要扣除多少點換獎勵？`, "0");
            if (used === null || parseInt(used) <= 0) return;
            if (parseInt(used) > balance) return alert("點數不足！");

            let date = new Date().toLocaleDateString();
            let record = { id: Date.now(), date, used: used, remain: -parseInt(used) };

            let history = JSON.parse(localStorage.getItem(currentChild + '_logs') || "[]");
            history.unshift(record);
            localStorage.setItem(currentChild + '_logs', JSON.stringify(history));

            alert(`兌換成功！已扣除 ${used} 點。`);
            loadData();
        }

        function deleteLog(logId) {
            if (!confirm("確定要刪除這筆紀錄嗎？這會影響銀行總金額喔！")) return;
            let history = JSON.parse(localStorage.getItem(currentChild + '_logs') || "[]");
            history = history.filter(item => item.id !== logId);
            localStorage.setItem(currentChild + '_logs', JSON.stringify(history));
            loadData();
        }

        function loadData() {
            let history = JSON.parse(localStorage.getItem(currentChild + '_logs') || "[]");
            let balance = 0;
            let html = "";

            history.forEach(log => {
                balance += parseInt(log.remain);
                html += `<div class="history-item">
                        <span>📅 ${log.date}<br><small>扣除獎勵：${log.used} | <b>剩餘：${log.remain}</b></small></span>
                        <span class="del-btn" onclick="deleteLog(${log.id})">❌ 刪除</span>
                     </div>`;
            });

            document.getElementById('bank-val').innerText = balance;
            document.getElementById('history-content').innerHTML = html || "<p style='color:grey; font-size:0.8em;'>尚無歷史紀錄</p>";
        }

        function resetToday() {
            document.querySelectorAll('.cb').forEach(cb => cb.checked = false);
            updateScore();
        }

        document.querySelectorAll('.cb').forEach(cb => cb.addEventListener('change', updateScore));
        window.onload = () => loadData();
    </script>

</body>

</html>
